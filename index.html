<!DOCTYPE html>
<html lang="ru">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>МАГАЗИН ВТШЕК</title>
    <style>
        :root {
            --dark-bg: #080808;
            --slot-bg: #121212;
            --slot-border: #332e2a;
            --gold: #887241;
            --muted-gold: #7a6a4a;
            --text: #b0b0b0;
            --overlay: rgba(0, 0, 0, 0.9);
        }

        body {
            background: var(--dark-bg);
            color: var(--text);
            font-family: 'Oswald', sans-serif;
            margin: 0;
            padding: 10px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .sticky-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(8,8,8,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            padding: 8px 15px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .total-info { font-size: 1em; color: var(--gold); text-transform: uppercase; }
        .total-info span { color: #fff; text-shadow: 0 0 10px var(--gold); }

        .btn-action {
            font-family: 'Oswald', sans-serif !important;
            background: rgba(194,163,93,0.1);
            border: 1px solid var(--muted-gold);
            color: var(--gold);
            padding: 5px 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.7em;
            margin-left: 5px;
            transition: 0.2s;
        }

        .btn-action:hover { background: var(--gold); color: #000; }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }

        .item-slot {
            background: var(--slot-bg);
            border: 1px solid var(--slot-border);
            display: flex; flex-direction: column;
        }

        .item-image-container {
            aspect-ratio: 1.3/1;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        .item-image-container img { max-width: 100%; max-height: 100%; object-fit: cover; }
        .img-fallback { position: absolute; font-size: 1.5em; opacity: 0.1; color: var(--gold); }

        .item-details { padding: 5px; text-align: center; }
        .item-title { font-size: 0.7em; color: var(--muted-gold); height: 2.2em; line-height: 1.1; display: flex; align-items: center; justify-content: center; }
        .item-price { font-size: 1em; color: #afaca8; margin-bottom: 5px; }

        .item-input-group { border-top: 1px solid #222; padding-top: 10px; display: flex; flex-direction: column; align-items: center; }
        input[type="number"] { width: 85%; background: #000; border: 1px solid var(--muted-gold); color: var(--gold); text-align: center; padding: 1px; font-size: 0.85em; margin-bottom: 6px; -moz-appearance: textfield; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .subtotal-tag { font-size: 0.7em; margin-top: 6px; color: var(--gold); font-weight: bold; }

        #orderModal {
            display: none;
            position: fixed; z-index: 2000; inset: 0;
            background: var(--overlay);
            justify-content: center; align-items: center;
        }

        .quantity-controls {
            display: flex;
            justify-content: center;
            gap: 50%;
            width: 85%;
        }

        .btn-qty {
            background: rgba(136, 114, 65, 0.3);
            border: 1px solid var(--muted-gold);
            color: var(--gold);
            width: 20px;
            height: 21px;
            font-size: 1.4em;
            line-height: 1;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .btn-qty:hover {
            background: var(--gold);
            color: #000;
        }

        .modal-content {
            background: #151515;
            border: 2px solid var(--gold);
            padding: 25px;
            width: 90%; max-width: 500px;
            border-radius: 8px;
        }

        .preview-label {
            font-size: 0.85em;
            color: var(--gold);
            text-transform: uppercase;
            margin: 18px 0 6px;
            letter-spacing: 0.5px;
        }

        .preview-block {
            background: rgba(0,0,0,0.4);
            padding: 10px 12px;
            border: 1px solid var(--muted-gold);
            border-radius: 6px;
            font-size: 0.9em;
            white-space: pre-wrap;
            color: var(--text);
            max-height: 180px;
            overflow-y: auto;
        }

        .total-block {
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            color: var(--gold);
            border-radius: 8px;
            margin-top: 20px;
        }

        .form-group select, .form-group textarea {
            width: 100%; background: #000; border: 1px solid var(--slot-border);
            color: #fff; padding: 8px; box-sizing: border-box;
            font-family: 'Oswald', sans-serif; border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <div class="total-info">Сумма:   <span id="grandTotal">0</span> <small>кроль</small></div>
        <div>
            <button class="btn-action" onclick="openModal()">Заполнить шаблон</button>
            <button class="btn-action" onclick="resetAll()">Сброс</button>
        </div>
    </div>

    <div class="inventory-grid" id="mainGrid"></div>
</div>

<div id="orderModal">
    <div class="modal-content">
        <h2 style="color:var(--gold);text-align:center;font-size:1.2em;margin-top:0;">ДЕТАЛИ СДЕЛКИ</h2>
        
        <label class="preview-label">Способ получения</label>
        <div class="form-group">
            <select id="orderMethod">
                <option value="На локации-метро">На локации-метро</option>
                <option value="Санта-Муерте">Санта-Муерте</option>
                <option value="Перепись">Перепись</option>
            </select>
        </div>

        <label class="preview-label">Примечание</label>
        <div class="form-group">
            <textarea id="orderNote" rows="3" placeholder="Какие-либо уточнения..."></textarea>
        </div>

        <label class="preview-label">Товары</label>
        <div class="preview-block" id="itemsPreview">—</div>

        <div class="total-block" id="totalPreview">Итоговая сумма: 0 кроль</div>

        <div style="display:flex;justify-content:space-between;margin-top:30px;">
            <button class="btn-action" onclick="closeModal()">Отмена</button>
            <button class="btn-action" style="background:var(--gold);color:#000;" onclick="copyTemplate()">СКОПИРОВАТЬ ШАБЛОН</button>
        </div>
    </div>
</div>

<script>

    {name:"Любопытный воробушек",price:35},

    {name:"Клинок Белой Розы",price:35},
    {name:"Лживая Алая Роза",price:35},
    {name:"Пак 'Оружие 1'",price:95},
    {name:"Обсидиановый нож",price:35},
    {name:"Боевой топор",price:35},
    {name:"Проклятый мушкетон",price:35},
    {name:"Пак 'Оружие 2'",price:95},
    {name:"Вулканический очаг",price:35},
    {name:"Пульс льдов",price:35},
    {name:"Анафемское средоточие",price:35},
    {name:"Пак 'Ритм сердцец'",price:95},
    {name:"Брошь Янтарного Мотылька",price:35},
    {name:"Брошь Стрекозы Индиго",price:35},
    {name:"Сердце Возлюбленной бабочки",price:35},
    {name:"Стрекот Далёких Звёзд",price:35},
    {name:"Спектральная оса",price:35},
    {name:"Пак 'Трепет крыльев'",price:150},

    {name:"Вепрёныш",price:30},
    {name:"Значок дуэлянта",price:35},
    {name:"Значок репортёра",price:35},
    {name:"Значок горца",price:35},
    {name:"Значок блатерскита",price:35},
    {name:"Старинный медальон охотников",price:35},
    {name:"Пак 'Отголосок запада'",price:150},
    {name:"Уроборос",price:35},
    {name:"Проклятый якорь",price:35},
    {name:"Пак 'Твари из недр'",price:60},

    {name:"Скорпион Акрабуамелу",price:35},

    {name:"Пурпурный живоглот",price:30},

    {name:"Сыроежка чешуйчатая",price:30},
    {name:"Сыроежка синяя",price:30},

    {name:"Душа дьявола",price:20},

    {name:"Пернатый фамильяр",price:20},
    {name:"Треклятый череп",price:20},
    {name:"Пак 'Шаманизм'",price:70}
];

    let total = 0;

function createGrid() {
        const grid = document.getElementById('mainGrid');
        items.forEach((item, i) => {
            const slot = document.createElement('div');
            slot.className = 'item-slot';
            slot.innerHTML = `
                <div class="item-image-container">
                    <div class="img-fallback">⚔</div>
                    <img src="https://achterstem.github.io/vtshki/${item.name}.png" onerror="this.style.display='none'">
                </div>
                <div class="item-details">
                    <div class="item-title">${item.name}</div>
                    <div class="item-price">${item.price} кроль</div>
                    <div class="item-input-group">
                        <input type="number" min="0" value="" id="qty-${i}" oninput="update()">
                        <div class="quantity-controls">
                            <button class="btn-qty" onclick="changeQty(${i}, -1)">−</button>
                            <button class="btn-qty" onclick="changeQty(${i}, 1)">+</button>
                        </div>
                        <div class="subtotal-tag" id="sub-${i}">0</div>
                    </div>
                </div>`;
            grid.appendChild(slot);
        });
    }


    function changeQty(index, delta) {
        const input = document.getElementById(`qty-${index}`);
        let val = parseInt(input.value) || 0;
        val += delta;
        if (val < 0) val = 0;
        input.value = val > 0 ? val : "";
        update();
    }

    function update() {
        total = 0;
        items.forEach((item, i) => {
            const q = parseInt(document.getElementById(`qty-${i}`).value) || 0;
            const s = q * item.price;
            document.getElementById(`sub-${i}`).textContent = s;
            total += s;
        });
        document.getElementById('grandTotal').textContent = total;
        if (document.getElementById('orderModal').style.display === 'flex') updatePreview();
    }

    function resetAll() {
        items.forEach((_, i) => {
            document.getElementById(`qty-${i}`).value = "";
            document.getElementById(`sub-${i}`).textContent = 0;
        });
        total = 0;
        document.getElementById('grandTotal').textContent = 0;
    }

    function getItemsList() {
        let list = "";
        items.forEach((item, i) => {
            const q = parseInt(document.getElementById(`qty-${i}`).value) || 0;
            if (q > 0) list += `📦 ${item.name} — ${q} шт.\n`;
        });
        return list.trim() || "—";
    }

    function generateTemplate() {
        const method = document.getElementById('orderMethod').value;
        const note = document.getElementById('orderNote').value.trim() || "—";
        const list = getItemsList();

        return `Способ получения: ${method}
Примечание: ${note}
━━━━━━━━━━━━━━
Товары:
${list}
━━━━━━━━━━━━━━
Итоговая сумма: ${total} кроль`;
    }

    function updatePreview() {
        document.getElementById('itemsPreview').textContent = getItemsList();
        document.getElementById('totalPreview').textContent = `Итоговая сумма: ${total} кроль`;
    }

    function openModal() {
        if (total === 0) return alert("Вы ничего не выбрали!");
        updatePreview();
        document.getElementById('orderModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('orderModal').style.display = 'none';
    }

    function copyTemplate() {
        navigator.clipboard.writeText(generateTemplate()).then(() => {
            alert("Шаблон скопирован в буфер обмена.");
            closeModal();
        }).catch(() => alert("Не скопировалось."));
    }

    createGrid();
</script>
</body>
</html>
